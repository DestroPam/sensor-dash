<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ панель | Умный мониторинг</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f4f8;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .card h2 {
            margin-bottom: 20px;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #475569;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-warning {
            background: #f59e0b;
            color: white;
        }

        .btn-warning:hover {
            background: #d97706;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
        }

        .btn-secondary {
            background: #64748b;
            color: white;
        }

        .btn-secondary:hover {
            background: #475569;
        }

        .warning-box {
            background: #fee2e2;
            padding: 15px;
            border-radius: 12px;
            margin: 15px 0;
            border-left: 4px solid #ef4444;
        }

        .warning-box h4 {
            color: #991b1b;
            margin-bottom: 8px;
        }

        .warning-box p {
            color: #7f1d1d;
            font-size: 0.85rem;
        }

        hr {
            margin: 20px 0;
            border: none;
            border-top: 1px solid #e2e8f0;
        }

        .login-form {
            text-align: center;
        }

        .login-form input {
            margin-bottom: 10px;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #3b82f6;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .status {
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
        }

        .status.success {
            background: #d1fae5;
            color: #065f46;
        }

        .status.error {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <h2>🔐 Админ панель</h2>
            
            <div id="loginSection">
                <div class="login-form">
                    <div class="form-group">
                        <input type="text" id="username" placeholder="Логин" value="admin">
                    </div>
                    <div class="form-group">
                        <input type="password" id="password" placeholder="Пароль" value="admin">
                    </div>
                    <button class="btn-primary" id="loginBtn" style="width: 100%;">Войти</button>
                </div>
            </div>

            <div id="adminSection" style="display: none;">
                <div id="statusMsg"></div>
                
                <div class="warning-box">
                    <h4>⚠️ Внимание!</h4>
                    <p>Все операции по удалению данных НЕОБРАТИМЫ. Пожалуйста, будьте осторожны.</p>
                </div>

                <h3>🗑️ Удалить данные датчика</h3>
                <div class="form-group">
                    <select id="deviceSelect"></select>
                </div>
                <button class="btn-danger" id="deleteDeviceBtn" style="width: 100%;">Удалить данные выбранного датчика</button>

                <hr>

                <h3>📅 Удалить данные за период</h3>
                <div class="form-group">
                    <select id="rangeDeviceSelect">
                        <option value="">Все датчики</option>
                    </select>
                </div>
                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex: 1;">
                        <input type="datetime-local" id="startDate">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <input type="datetime-local" id="endDate">
                    </div>
                </div>
                <button class="btn-warning" id="deleteRangeBtn" style="width: 100%;">Удалить данные за период</button>

                <hr>

                <button class="btn-danger" id="deleteAllBtn" style="width: 100%;">⚠️ Удалить ВСЕ данные</button>

                <hr>

                <button class="btn-secondary" id="logoutBtn" style="width: 100%;">🚪 Выйти</button>
            </div>
            
            <a href="/" class="back-link">← Вернуться на главную</a>
        </div>
    </div>

    <script>
        let isLoggedIn = false;

        async function checkAuth() {
            try {
                const response = await fetch('/api/admin/check');
                const data = await response.json();
                if (data.authenticated) {
                    isLoggedIn = true;
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('adminSection').style.display = 'block';
                    await loadDevices();
                }
            } catch (error) {
                console.error('Ошибка проверки авторизации:', error);
            }
        }

        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    isLoggedIn = true;
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('adminSection').style.display = 'block';
                    await loadDevices();
                    showStatus('Вход выполнен успешно!', 'success');
                } else {
                    showStatus('Неверный логин или пароль', 'error');
                }
            } catch (error) {
                showStatus('Ошибка подключения к серверу', 'error');
            }
        }

        async function logout() {
            try {
                await fetch('/api/admin/logout', { method: 'POST' });
                isLoggedIn = false;
                document.getElementById('loginSection').style.display = 'block';
                document.getElementById('adminSection').style.display = 'none';
                showStatus('Вы вышли из системы', 'success');
            } catch (error) {
                console.error('Ошибка выхода:', error);
            }
        }

        async function loadDevices() {
            try {
                const response = await fetch('/api/devices');
                const devices = await response.json();
                
                const deviceSelect = document.getElementById('deviceSelect');
                const rangeDeviceSelect = document.getElementById('rangeDeviceSelect');
                
                deviceSelect.innerHTML = devices.map(d => `<option value="${d}">${d}</option>`).join('');
                rangeDeviceSelect.innerHTML = '<option value="">Все датчики</option>' + 
                    devices.map(d => `<option value="${d}">${d}</option>`).join('');
            } catch (error) {
                console.error('Ошибка загрузки устройств:', error);
            }
        }

        async function deleteDevice() {
            const device = document.getElementById('deviceSelect').value;
            if (!device) return;
            
            if (confirm(`Удалить ВСЕ данные датчика "${device}"? Это действие необратимо!`)) {
                try {
                    const response = await fetch(`/api/admin/delete/device/${encodeURIComponent(device)}`, {
                        method: 'DELETE'
                    });
                    if (response.ok) {
                        const result = await response.json();
                        showStatus(`Удалено ${result.deleted_count} записей датчика "${device}"`, 'success');
                        await loadDevices();
                    } else {
                        showStatus('Ошибка при удалении', 'error');
                    }
                } catch (error) {
                    showStatus('О
