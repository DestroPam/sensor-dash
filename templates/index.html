<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Визуализация датчиков | Умный мониторинг</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="/static/styles/main.css">
</head>

<body>
    <!-- Top Navigation Bar -->
    <div class="navbar">
        <div class="navbar-container">
            <span class="navbar-title">Датчики</span>
            <div class="navbar-buttons">
                <button id="navLoginBtn" class="nav-button">Вход</button>
                <button id="navAdminBtn" class="nav-button" style="display: none; background: #8b5cf6;">Админ панель</button>
                <button id="navLogoutBtn" class="nav-button" style="display: none; background: #64748b;">Выход</button>
            </div>
        </div>
    </div>

    <div class="dashboard">
        <div class="sensors-panel">
            <button class="back-button" id="backToGridBtn" style="width:100%; margin-bottom: 12px;">Главная страница</button>
            <h3>Датчики</h3>
            <div id="sensorsList" class="sensors-list">
                <div style="text-align: center; padding: 20px; color: #94a3b8;">Загрузка...</div>
            </div>
            <button id="refreshSensorsBtn" style="margin-top: 12px; width:100%;">Обновить список</button>
        </div>

        <div class="main-panel">
            <div id="gridView">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2>Текущие показания</h2>
                    <span class="hide-on-mobile" style="font-size: 0.8rem; color: #64748b;">Нажмите на карточку для детальной статистики</span>
                </div>
                <div id="sensorsGrid" class="sensors-grid">
                    <div class="empty-grid">Загрузка данных...</div>
                </div>
            </div>

            <div id="detailView" style="display: none;">
                <div class="detail-header">
                    <button id="mobileBackToGridBtn" type="button" class="back-button mobile-only-back" style="display: none;">← Назад к списку</button>
                    <h2 id="detailSensorName">Датчик</h2>
                </div>

                <div class="live-data">
                    <div class="live-title">
                        <span id="currentSensorName">Выберите датчик</span>
                        <span class="status-badge" id="liveStatus">онлайн</span>
                    </div>
                    <div class="sensor-metrics" id="sensorMetrics" style="display: none;">
                        <div class="metric metric-temp">Температура<br><span class="metric-value" id="tempVal">--</span> <span
                                class="metric-unit"></span></div>
                        <div class="metric metric-hum">Влажность<br><span class="metric-value" id="humVal">--</span> <span
                                class="metric-unit"></span></div>
                        <div class="metric metric-press">Давление<br><span class="metric-value" id="pressVal">--</span> <span
                                class="metric-unit"></span></div>
                    </div>
                    <div class="tile-update-time" id="liveUpdateTime" style="display: none;">--</div>
                </div>

                <div class="controls">
                    <select id="metricType">
                    </select>

                    <div style="display: flex; gap: 10px; align-items: center;">
                        <span>Период:</span>
                        <select id="periodPreset">
                            <option value="1">В реальном времени</option>
                            <option value="24">Последние 24 часа</option>
                            <option value="168">Последние 7 дней</option>
                            <option value="720">Последние 30 дней</option>
                            <option value="custom">Произвольный</option>
                            <option value="all">Вся история</option>
                        </select>
                    </div>

                    <div id="customDateRange" style="display: none; gap: 10px;">
                        <input type="datetime-local" id="startDate">
                        <input type="datetime-local" id="endDate">
                    </div>
                </div>

                <div class="chart-container">
                    <canvas id="mainChart" width="800" height="350"></canvas>
                </div>
            </div>
        </div>
    </div>

     <!-- Подключаем все JavaScript файлы -->
     <script src="/static/js/utils.js"></script>
     <script src="/static/js/api.js"></script>
     <script src="/static/js/dragdrop.js"></script>
     <script src="/static/js/chart.js"></script>
     <script src="/static/js/app.js"></script>

     <!-- No manual resize needed: Chart.js responsive + CSS container heights handle it -->

</body>

</html>
